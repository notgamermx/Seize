<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#e879f9" />
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Premium Dark Curved Square -->
  <rect width="256" height="256" rx="55" fill="#09090b" />
  
  <!-- Inner Border for Glassmorphic Feel -->
  <rect x="4" y="4" width="248" height="248" rx="51" fill="none" stroke="url(#boltGrad)" stroke-width="2" opacity="0.3" />

  <!-- The Lightning Bolt -->
  <g transform="translate(-2, -2)">
    <path d="M140 50 L80 140 H130 L110 210 L180 110 H130 Z" fill="url(#boltGrad)" filter="url(#neon)" opacity="0.7"/>
    <path d="M140 50 L80 140 H130 L110 210 L180 110 H130 Z" fill="#ffffff" />
  </g>
</svg>